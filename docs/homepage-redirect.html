<!-- Rapls AI Chatbot - Language Redirect Page -->
<!--
============================================
【ブロックエディタ（Gutenberg）の場合】
「カスタムHTML」ブロックを使用してください。
自動リダイレクトが動作します。

【クラシックエディターの場合】
「テキスト」モードで貼り付け、ビジュアルモードに切り替えないでください。
スクリプトが消える場合は、下の「手動選択版」をご使用ください。
============================================
-->

<!-- 不要な要素を非表示 -->
<style>
.breadcrumb.breadcrumb-page.pbp-main-top,
.article-header.entry-header {
    display: none !important;
}
</style>

<!-- リダイレクト中の表示（一瞬表示される） -->
<div id="wpaic-redirect-loading" style="text-align: center; padding: 80px 20px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
    <div style="font-size: 3em; margin-bottom: 20px;">🤖</div>
    <p style="font-size: 1.5em; margin-bottom: 30px; color: #666;">Redirecting... / リダイレクト中...</p>
    <p style="color: #999;">
        <a href="/rapls-ai-chatbot-en/" style="color: #667eea; margin: 0 10px;">English</a>
        |
        <a href="/rapls-ai-chatbot-ja/" style="color: #667eea; margin: 0 10px;">日本語</a>
    </p>
</div>

<!-- 自動リダイレクトスクリプト -->
<script>
(function() {
    var lang = (navigator.language || navigator.userLanguage || '').toLowerCase();
    if (lang.indexOf('ja') === 0) {
        window.location.replace('/rapls-ai-chatbot-ja/');
    } else {
        window.location.replace('/rapls-ai-chatbot-en/');
    }
})();
</script>

<!-- JavaScriptが無効な場合 -->
<noscript>
<meta http-equiv="refresh" content="0; url=/rapls-ai-chatbot-en/">
</noscript>
