# SYNC: When adding new check steps, consider if the same check applies to
# rapls-ai-chatbot-pro/.github/workflows/zip-verify.yml (Pro uses allow-list + vendor deny).
name: Verify distribution ZIP

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify-zip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build ZIP via git archive
        run: git archive --format=zip HEAD -o dist.zip

      - name: Allow-list check (unknown files = fail)
        run: |
          # Allow-list: only these top-level entries may exist in the ZIP.
          # Add ONLY runtime files/assets needed by WordPress. Never add CI, docs, or dev files.
          ALLOWED='^rapls-ai-chatbot/(assets/|includes/|languages/|templates/|rapls-ai-chatbot\.php|readme\.txt|uninstall\.php|$)'
          # Extract file paths from unzip listing (skip header/footer lines)
          ENTRIES=$(unzip -l dist.zip | awk 'NR>3 && /^ / && NF>=4 {print $NF}' | grep -v '^-' | grep -v '^$')
          UNEXPECTED=$(echo "$ENTRIES" | grep -vE "$ALLOWED" || true)
          if [ -n "$UNEXPECTED" ]; then
            echo "::error::Unexpected files in ZIP (not in allow-list):"
            echo "$UNEXPECTED"
            echo ""
            echo "If these are runtime files needed by WordPress, add them to the"
            echo "ALLOWED pattern in .github/workflows/zip-verify.yml and re-run."
            echo "Do NOT add CI, docs, or dev-only files — use .gitattributes export-ignore instead."
            exit 1
          fi
          # Light check: warn on unusual extensions inside assets/vendor/ (e.g. .map, .bak)
          ASSET_VENDOR=$(echo "$ENTRIES" | grep 'assets/vendor/' || true)
          if [ -n "$ASSET_VENDOR" ]; then
            AV_UNUSUAL=$(echo "$ASSET_VENDOR" | grep -vE '\.(js|css|json|md|txt|map|min\.js|min\.css)$' | grep -vE '(/|^)$' | grep -vE '/(LICENSE|README)(\.(md|txt))?$' || true)
            if [ -n "$AV_UNUSUAL" ]; then
              echo "::warning::Unusual files in assets/vendor/ (review if needed):"
              echo "$AV_UNUSUAL" | head -10
            fi
          fi
          echo "OK: all files match allow-list"

      - name: Catch-swallow check (completed_at-sensitive files)
        run: |
          # Source list: .ci/sensitive-files.txt (single source of truth)
          if [ ! -f .ci/sensitive-files.txt ]; then
            echo "::error::.ci/sensitive-files.txt not found"
            exit 1
          fi
          FAIL=0
          while IFS= read -r f || [ -n "$f" ]; do
            # Skip blank lines and comments
            [[ -z "$f" || "$f" == \#* ]] && continue
            if [ ! -f "$f" ]; then continue; fi
            # For each catch block, check if throw/rethrow appears within 40 lines after.
            # Keep catch blocks short (<40 lines) with throw/rethrow at the end — see CLAUDE.md.
            CATCH_LINES=$(grep -n 'catch' "$f" | grep -v '^#' || true)
            if [ -z "$CATCH_LINES" ]; then continue; fi
            while IFS=: read -r lineno _rest; do
              END=$((lineno + 40))
              HAS_THROW=$(sed -n "${lineno},${END}p" "$f" | grep -c 'throw\|rethrow' || true)
              if [ "$HAS_THROW" -eq 0 ]; then
                echo "::warning::$f:$lineno — catch block without throw/rethrow within 40 lines"
                FAIL=1
              fi
            done <<< "$CATCH_LINES"
          done < .ci/sensitive-files.txt
          if [ "$FAIL" -ne 0 ]; then
            echo "::error::Possible exception swallow detected (see warnings above)"
            exit 1
          fi
          echo "OK: no catch-swallow detected"

      - name: Activator side-effect check (allow-list approach)
        run: |
          # class-activator.php is require'd by uninstall.php for get_table_suffixes().
          # Two-layer check: deny-list safety net + allow-list for comprehensive coverage.
          FILE="includes/class-activator.php"
          FAIL=0

          # --- Layer 1: Deny-list safety net (catches critical APIs even if allow-list is wrong) ---
          # Policy: Activator's allowed side effects are ONLY these specific APIs:
          #   DB schema : dbDelta, $wpdb->{query,prepare,get_var,get_col,get_results,get_row}
          #   Options   : get_option, update_option, delete_option, add_option, get_site_option
          #   Transients: set_transient, get_transient, delete_transient
          #   WP cron   : wp_schedule_event, wp_next_scheduled, wp_clear_scheduled_hook
          #   WP utils  : wp_salt, flush_rewrite_rules, error_log, maybe_create_table
          # Everything else (posts, users, files, HTTP, hooks, code execution) is forbidden.
          # $wpdb->insert/update/delete are forbidden by default — require design review:
          #   1. Target must be plugin-owned table only (wp_aichat_*)
          #   2. No unsanitized user input (use $wpdb->prepare or type-cast)
          #   3. Must be idempotent (safe to re-run on interrupted upgrade)
          # When adding new WordPress APIs, check if they belong to the categories above.
          # Keep patterns in execution-form only (\() to avoid comment/string false positives.
          DENY=$(grep -vE '^\s*(\*|//|#|/\*)' "$FILE" | grep -E '(^|[^A-Za-z0-9_])(eval|assert|exec|system|passthru|shell_exec|popen|proc_open|pcntl_exec|wp_remote_(get|post|head|request)|wp_mail|wp_insert_post|wp_update_post|wp_delete_post|wp_insert_user|wp_update_user|wp_upload_bits|file_put_contents|file_get_contents|fopen|fwrite|curl_exec|add_action|add_filter|register_activation_hook|register_deactivation_hook)[[:space:]]*\(' || true)
          # Also catch indirect calls: call_user_func('wp_remote_...') etc.
          INDIRECT=$(grep -vE '^\s*(\*|//|#|/\*)' "$FILE" | grep -E "call_user_func(_array)?[[:space:]]*\([[:space:]]*['\"]wp_(remote_|mail|insert_|update_|delete_|upload_)" || true)
          DENY="${DENY}${INDIRECT}"
          if [ -n "$DENY" ]; then
            echo "::error::CRITICAL: Dangerous API in $FILE (deny-list):"
            echo "$DENY"
            FAIL=1
          fi

          # --- Layer 2: Allow-list (only permitted function calls pass) ---
          # Pre-filter: strip comment lines and SQL definitions that mimic function calls.
          # Filters are intentionally narrow to minimize hidden-call risk:
          #   - KEY/INDEX: lowercase column names only (PHP identifiers are typically camelCase)
          #   - COMMENT: SQL syntax only (COMMENT 'text')
          # Even if a filter accidentally hides a call, Layer 1 deny-list catches dangerous APIs.
          CALLS=$(grep -vE '^\s*(\*|//|#|/\*)' "$FILE" | grep -vE 'KEY [a-z_]+ \(' | grep -vE 'INDEX [a-z_]+ \(' | grep -vE "COMMENT '" | grep -oE '[A-Za-z_][A-Za-z0-9_]*[[:space:]]*\(' || true)
          # Allowed: PHP constructs, DB/option APIs, WP cron, internal methods.
          # SQL types: explicit list (not blanket uppercase) to keep scope tight.
          ALLOWED_CALLS='(function|if|else|elseif|foreach|for|while|switch|catch|return|array|isset|empty|defined|class|self|static|new|require_once|require|include_once|include|dbDelta|get_option|update_option|delete_option|add_option|get_site_option|set_transient|get_transient|delete_transient|get_charset_collate|prepare|query|get_var|get_col|get_results|get_row|esc_like|esc_sql|maybe_create_table|version_compare|absint|sanitize_text_field|wp_parse_url|get_site_url|error_log|sprintf|substr|strlen|str_pad|strpos|strtolower|time|is_array|in_array|array_merge|array_key_exists|array_fill|array_chunk|implode|count|intval|max|min|trim|preg_match|preg_replace|wp_clear_scheduled_hook|wp_next_scheduled|wp_schedule_event|wp_salt|flush_rewrite_rules|WPAIC_VERSION|get_table_suffixes|create_tables|upgrade_columns|set_default_options|schedule_cron|migrate_diag_options|activate|upgrade|safe_alter|maybe_add_token_columns|maybe_add_is_active_column|maybe_add_custom_fields_column|maybe_add_feedback_column|maybe_add_cache_columns|maybe_add_knowledge_columns|maybe_create_audit_log_table|maybe_add_conversations_columns|maybe_add_messages_columns|maybe_add_conversion_columns|maybe_add_message_composite_index|maybe_add_feedback_index|maybe_convert_enum_to_varchar|BIGINT|VARCHAR|INT|TINYINT|SMALLINT|MEDIUMINT|CHAR|DECIMAL|FLOAT|DOUBLE|ENUM|SET|KEY|CURRENT_TIMESTAMP)'
          UNEXPECTED_CALLS=$(echo "$CALLS" | sed 's/[[:space:]]*(//' | grep -vE "^${ALLOWED_CALLS}$" | sort -u || true)
          if [ -n "$UNEXPECTED_CALLS" ]; then
            echo "::error::Unexpected function calls in $FILE (not in allow-list):"
            echo "$UNEXPECTED_CALLS"
            echo ""
            echo "If this call is safe for uninstall context, add it to ALLOWED_CALLS."
            echo "For new SQL types (e.g. JSONB), add to the SQL type section at the end of ALLOWED_CALLS."
            echo "NEVER add: eval, assert, exec, wp_remote_*, wp_mail, file_put_contents, add_action, add_filter."
            FAIL=1
          fi
          if [ "$FAIL" -ne 0 ]; then exit 1; fi
          echo "OK: all function calls in activator are allowed"

      - name: Gitattributes essential entries check
        run: |
          # Critical entries: fail if missing (these leak sensitive/CI files into ZIP).
          CRITICAL=".github .ci CLAUDE.md"
          FAIL=0
          for entry in $CRITICAL; do
            if ! grep -q "$entry.*export-ignore" .gitattributes; then
              echo "::error::CRITICAL export-ignore missing in .gitattributes: $entry"
              FAIL=1
            fi
          done
          # Advisory entries: warn only (nice-to-have but not a security leak).
          ADVISORY=".claude .env .serena"
          for entry in $ADVISORY; do
            if ! grep -q "$entry.*export-ignore" .gitattributes; then
              echo "::warning::Advisory export-ignore missing in .gitattributes: $entry"
              echo "::warning::Also check rapls-ai-chatbot-pro/.gitattributes for sync."
            fi
          done
          if [ "$FAIL" -ne 0 ]; then
            exit 1
          fi
          echo "OK: essential .gitattributes entries present"

      - name: ZIP content keyword verification
        run: |
          # Verify critical implementation keywords exist in the built ZIP.
          FAIL=0
          check_keyword() {
            local file="$1" keyword="$2" label="$3"
            COUNT=$(unzip -p dist.zip "rapls-ai-chatbot/$file" | grep -c "$keyword" || true)
            if [ "$COUNT" -eq 0 ]; then
              echo "::error::ZIP missing: $label ($keyword not found in $file)"
              FAIL=1
            else
              echo "  OK: $label ($COUNT match(es))"
            fi
          }
          check_keyword "includes/api/class-rest-controller.php" "wpaic_cookie_samesite" "H-2 SameSite filter"
          check_keyword "includes/api/class-rest-controller.php" "check_same_origin" "CSRF origin check"
          check_keyword "includes/class-main.php" "wpaic_after_cleanup" "M-2 cleanup hook"
          check_keyword "includes/models/class-knowledge.php" "csv_safe_cell" "CSV injection protection"
          # M-1: SameSite=None + HTTP warning must exist in admin class
          check_keyword "includes/admin/class-admin.php" "wpaic_cookie_samesite" "M-1 SameSite admin warning"
          if [ "$FAIL" -ne 0 ]; then exit 1; fi
          echo "OK: all implementation keywords verified in ZIP"

      - name: REST debug key exposure check
        run: |
          # Ensure debug/diagnostic data in REST responses is gated behind capability checks.
          # Future: unify REST response output into a single helper to make this check exact.
          # For now, heuristic: debug-like keys must have a capability guard within 20 lines.
          REST="includes/api/class-rest-controller.php"
          if [ ! -f "$REST" ]; then exit 0; fi
          # Find lines that add debug/diagnostic keys to response arrays
          DEBUG_LINES=$(grep -nE "'(debug|debug_info|diag|diagnostic|trace)'" "$REST" | grep -vE '^\s*[0-9]+:\s*(//|#|\*)' || true)
          if [ -n "$DEBUG_LINES" ]; then
            # Verify each debug line has a capability guard within 20 lines before it
            FAIL=0
            while IFS=: read -r lineno _rest; do
              START=$((lineno - 20))
              [ "$START" -lt 1 ] && START=1
              GUARD=$(sed -n "${START},${lineno}p" "$REST" | grep -c 'current_user_can\|is_user_logged_in\|WP_DEBUG' || true)
              if [ "$GUARD" -eq 0 ]; then
                echo "::warning::$REST:$lineno — 'debug' in response without capability guard within 20 lines"
                FAIL=1
              fi
            done <<< "$DEBUG_LINES"
            if [ "$FAIL" -ne 0 ]; then
              echo "::error::Unguarded debug data in REST responses (see warnings above)"
              exit 1
            fi
          fi
          echo "OK: debug keys are properly guarded"

      - name: JS hardcoded user-facing string check
        run: |
          # User-facing strings in chatbot.js should use config.strings for i18n.
          # This check flags common patterns of hardcoded strings that should be translatable.
          JS="assets/js/chatbot.js"
          if [ ! -f "$JS" ]; then exit 0; fi
          FAIL=0
          # Pattern: string assignments with common user-facing keywords (not in comments)
          # Skip lines that reference config.strings (already i18n'd)
          HARDCODED=$(grep -nE "(innerHTML|textContent|innerText|\.text)\s*=" "$JS" \
            | grep -vE '^\s*[0-9]+:\s*(//|/\*)' \
            | grep -E "'[A-Z][a-z].*'|\"[A-Z][a-z].*\"" \
            | grep -v 'config\.strings' \
            | grep -v 'escapeHtml' \
            | grep -vE "'(div|span|button|img|input|form|a|p|ul|li|br|hr)'" \
            || true)
          if [ -n "$HARDCODED" ]; then
            echo "::warning::Possible hardcoded user-facing strings in $JS (should use config.strings):"
            echo "$HARDCODED" | head -10
            # Warning only for now — enable FAIL=1 once all strings are migrated
          fi
          echo "OK: JS string i18n check complete"
